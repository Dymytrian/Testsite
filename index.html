<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Множення на 7</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

  <h1 class="mb-4">🔢 Множення дійсного числа на 7</h1>

  <form id="calcForm" class="row g-3">
    <div class="col-auto">
      <input type="number" step="any" class="form-control" id="inputNumber" placeholder="Введіть число (float)">
    </div>
    <div class="col-auto">
      <button type="submit" class="btn btn-primary">Обчислити</button>
    </div>
  </form>

  <div id="result" class="mt-4 alert alert-info" style="display:none;"></div>
  <div id="error" class="mt-4 alert alert-danger" style="display:none;"></div>

  <script>
    document.getElementById("calcForm").addEventListener("submit", async function(e) {
      e.preventDefault();
      let input = document.getElementById("inputNumber").value;

      // Перевірка на порожній ввід
      if (!input) {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").innerText = "❌ Введіть число!";
        document.getElementById("result").style.display = "none";
        return;
      }

      let num = parseFloat(input);

      // Якщо не число
      if (isNaN(num)) {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").innerText = "❌ Невірний формат числа!";
        document.getElementById("result").style.display = "none";
        return;
      }

      try {
        let response = await fetch("https://dima08.app.n8n.cloud/webhook-test/16abbe4a-3910-4813-b546-ee69f30f6a5a", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ number: num })
        });

        let data = await response.json();
        document.getElementById("error").style.display = "none";
        document.getElementById("result").style.display = "block";
        document.getElementById("result").innerText = "✅ Результат: " + data.result.toFixed(4);
      } catch (err) {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").innerText = "⚠️ Помилка з'єднання з сервером!";
        document.getElementById("result").style.display = "none";
      }
    });
  </script>

</body>
</html>
